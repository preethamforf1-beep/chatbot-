<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="900" viewBox="0 0 1680 900" role="img" aria-labelledby="title desc">
  <title id="title">HRMS Architecture Diagram</title>
  <desc id="desc">Architecture showing frontend, backend, chatbot routes, local data files, and Groq AI.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#eef2ff" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .section { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 18px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #334155; }
      .node { fill: url(#panel); stroke: #475569; stroke-width: 2; rx: 18; ry: 18; }
      .accent { fill: #e0f2fe; stroke: #0284c7; }
      .backend { fill: #ecfccb; stroke: #65a30d; }
      .chatbot { fill: #fae8ff; stroke: #c026d3; }
      .data { fill: #fff7ed; stroke: #ea580c; }
      .api { fill: #f1f5f9; stroke: #64748b; stroke-dasharray: 8 5; }
      .line { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.5; stroke-dasharray: 9 6; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#334155" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1680" height="900" fill="url(#bg)" />

  <text x="60" y="62" class="title">HRMS Architecture</text>
  <text x="60" y="96" class="subtitle">Frontend React app, Express backend, chatbot routes, and local data files</text>

  <rect x="100" y="165" width="320" height="220" class="node api" />
  <text x="165" y="215" class="section">User</text>
  <text x="165" y="245" class="small">Log in, ask questions,</text>
  <text x="165" y="270" class="small">view HRMS data</text>

  <rect x="460" y="135" width="380" height="240" class="node accent" />
  <text x="540" y="190" class="section">Frontend</text>
  <text x="540" y="220" class="small">React + Vite</text>
  <text x="540" y="245" class="small">Axios API requests</text>
  <text x="540" y="270" class="small">UI components, chat widget</text>

  <rect x="820" y="130" width="380" height="240" class="node backend" />
  <text x="895" y="185" class="section">Backend</text>
  <text x="895" y="215" class="small">Node.js + Express</text>
  <text x="895" y="240" class="small">CORS, dotenv, JWT auth</text>
  <text x="895" y="265" class="small">Routes: auth, employees, payroll, chatbot</text>

  <rect x="1320" y="130" width="320" height="250" class="node chatbot" />
  <text x="1395" y="185" class="section">Chatbot</text>
  <text x="1395" y="215" class="small">backend/routes/chatbot.js</text>
  <text x="1395" y="240" class="small">Rule-based logic + local fallback</text>
  <text x="1395" y="265" class="small">Groq AI for safe/non-sensitive queries</text>
  <text x="1395" y="290" class="small">Sensitive HR queries stay local</text>

  <rect x="820" y="400" width="380" height="190" class="node data" />
  <text x="895" y="445" class="section">Local Data</text>
  <text x="895" y="475" class="small">employees.js</text>
  <text x="895" y="500" class="small">users.js</text>
  <text x="895" y="525" class="small">companyData.js</text>

  <rect x="1320" y="400" width="320" height="190" class="node api" />
  <text x="1390" y="445" class="section">API Routes</text>
  <text x="1390" y="475" class="small">/api/auth</text>
  <text x="1390" y="500" class="small">/api/employees</text>
  <text x="1390" y="525" class="small">/api/payroll</text>
  <text x="1390" y="550" class="small">/api/chatbot</text>

  <rect x="420" y="640" width="340" height="190" class="node api" />
  <text x="495" y="695" class="section">Auth Flow</text>
  <text x="495" y="725" class="small">JWT token stored in localStorage</text>
  <text x="495" y="750" class="small">Included in frontend requests</text>

  <path d="M 360 260 L 420 260" class="line" />
  <text x="360" y="240" class="small">User action</text>

  <path d="M 760 270 L 820 270" class="line" />
  <text x="760" y="250" class="small">Frontend request</text>

  <path d="M 1180 280 L 1320 280" class="line" />
  <text x="1180" y="260" class="small">Chatbot API</text>

  <path d="M 1030 390 L 1030 400" class="dash" />
  <text x="1040" y="395" class="small">Reads local data</text>

  <path d="M 1030 390 L 1320 390" class="dash" />
  <text x="1100" y="375" class="small">API route handling</text>

  <path d="M 560 310 L 560 640" class="dash" />
  <text x="570" y="475" class="small">JWT token flow</text>

  <path d="M 560 640 L 820 640" class="dash" />
  <text x="650" y="660" class="small">Sent with backend calls</text>

  <rect x="60" y="760" width="1560" height="60" rx="12" ry="12" fill="#e2e8f0" />
  <text x="80" y="792" class="small">No external database is used in the current project. Data is stored in local JavaScript files inside hrms-portal/backend/data.</text>
</svg>